<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培正回收箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .heart-beat {
            animation: heartBeat 0.4s ease-in-out;
        }
        
        .toast {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .toast-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(-10px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-40 w-full bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="package" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">培正回收箱</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openCurrencyModal()" class="flex items-center gap-2 bg-zinc-800 text-zinc-100 px-4 py-2 rounded-full font-medium hover:bg-zinc-700 transition-colors active:scale-95 border border-zinc-700">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span>改變貨幣</span>
                </button>
                <button onclick="handleAISummary()" id="aiBtn" class="flex items-center gap-2 bg-zinc-800 text-zinc-100 px-4 py-2 rounded-full font-medium hover:bg-zinc-700 transition-colors active:scale-95 border border-zinc-700 disabled:opacity-50">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span id="aiBtnText">AI 摘要</span>
                </button>
                <button onclick="openModal()" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-full font-medium hover:bg-blue-700 transition-colors active:scale-95">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                    <span>我要轉賣</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Toast 提示 -->
    <div id="successToast" class="toast toast-hidden bg-green-500 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 font-bold">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span>✅ 已成功發佈！</span>
    </div>

    <!-- 手机专用 sticky 搜寻列 -->
    <div class="lg:hidden sticky top-16 z-30 bg-white/90 backdrop-blur-md border-b border-slate-100 px-4 py-3">
        <div class="flex items-center gap-3">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInputMobile" oninput="syncSearchInput()" placeholder="搜索物品..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
            </div>
            <button onclick="toggleSort()" class="flex items-center gap-2 bg-slate-50 border border-slate-100 rounded-xl py-2 px-3 hover:bg-slate-100 transition-all text-sm shrink-0">
                <i data-lucide="refresh-cw" id="sortIconMobile" class="w-4 h-4 text-slate-400 transition-transform duration-500"></i>
                <span id="sortLabelMobile" class="text-slate-600 font-medium">價格</span>
            </button>
            <button onclick="toggleMoreFilters()" class="flex items-center gap-2 bg-slate-50 border border-slate-100 rounded-xl py-2 px-3 hover:bg-slate-100 transition-all text-sm shrink-0">
                <i data-lucide="sliders-horizontal" class="w-4 h-4 text-slate-400"></i>
                <span>篩選</span>
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-1">
        
        <!-- Status Filter Tabs -->
        <div id="statusTabs" class="flex gap-2 mb-4 bg-slate-100 p-1 rounded-2xl w-fit">
            <button onclick="setStatusFilter('all')" class="status-btn px-6 py-2 rounded-xl text-sm font-bold transition-all bg-white text-blue-600 shadow-sm" data-status="all">全部</button>
            <button onclick="setStatusFilter('active')" class="status-btn px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-700" data-status="active">只看未賣出</button>
            <button onclick="setStatusFilter('done')" class="status-btn px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-700" data-status="done">只看已賣出</button>
            <button onclick="setStatusFilter('interested')" class="status-btn px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-700" data-status="interested">只看有興趣</button>
        </div>

        <!-- 桌面版 filter bar -->
        <div id="desktopFilterBar" class="hidden lg:flex flex-wrap gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <div class="relative w-full md:flex-[2] min-w-[200px]">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInputDesktop" oninput="syncSearchInput()" placeholder="搜索物品..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
            </div>
            <div class="flex items-center gap-2 w-full sm:w-[calc(50%-8px)] md:flex-1 min-w-[140px]">
                <i data-lucide="filter" class="text-slate-400 w-4 h-4"></i>
                <select id="mainCategorySelect" onchange="updateSubCategories(); renderList();" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <option value="全部">所有大類別</option>
                </select>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-[calc(50%-8px)] md:flex-1 min-w-[140px]">
                <i data-lucide="filter" class="text-slate-400 w-4 h-4"></i>
                <select id="subCategorySelect" onchange="renderList()" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none disabled:opacity-50" disabled>
                    <option value="全部">所有細類別</option>
                </select>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-[calc(50%-8px)] md:flex-1 min-w-[120px]">
                <i data-lucide="dollar-sign" class="text-slate-400 w-4 h-4"></i>
                <select id="priceRangeSelect" onchange="renderList()" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <!-- 动态生成 -->
                </select>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-[calc(50%-8px)] md:flex-1 min-w-[140px]">
                <i data-lucide="star" class="text-slate-400 w-4 h-4"></i>
                <select id="conditionSelect" onchange="renderList()" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <option value="all">全部全新度</option>
                    <option value="0-20">0 – 20%</option>
                    <option value="21-40">21 – 40%</option>
                    <option value="41-60">41 – 60%</option>
                    <option value="61-80">61 – 80%</option>
                    <option value="81-100">81 – 100%</option>
                </select>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-[calc(50%-8px)] md:flex-1 min-w-[160px]">
                <button onclick="toggleSort()" class="flex-1 flex items-center justify-between bg-slate-50 border border-slate-100 rounded-xl py-2 px-3 hover:bg-slate-100 transition-all text-sm group">
                    <div class="flex items-center gap-2 text-slate-400 group-hover:text-blue-600 truncate">
                        <i data-lucide="refresh-cw" id="sortIconDesktop" class="w-4 h-4 shrink-0 transition-transform duration-500"></i>
                        <span id="sortLabelDesktop" class="text-slate-600 font-medium truncate">價格：由低至高</span>
                    </div>
                    <div class="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider shrink-0 ml-1">切換</div>
                </button>
            </div>
            <button onclick="openModal()" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-200 active:scale-95">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span>發佈物件</span>
            </button>
        </div>

        <!-- 手机版篩選器 -->
        <div id="mobileFilters" class="hidden lg:hidden bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6 space-y-4">
            <div class="flex items-center gap-2">
                <i data-lucide="filter" class="text-slate-400 w-4 h-4"></i>
                <select id="mainCategorySelectMobile" onchange="syncMobileFilters(); renderList();" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <option value="全部">所有大類別</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <i data-lucide="filter" class="text-slate-400 w-4 h-4"></i>
                <select id="subCategorySelectMobile" onchange="syncMobileFilters(); renderList();" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none disabled:opacity-50" disabled>
                    <option value="全部">所有細類別</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <i data-lucide="dollar-sign" class="text-slate-400 w-4 h-4"></i>
                <select id="priceRangeSelectMobile" onchange="syncMobileFilters(); renderList();" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <!-- 动态生成 -->
                </select>
            </div>
            <div class="flex items-center gap-2">
                <i data-lucide="star" class="text-slate-400 w-4 h-4"></i>
                <select id="conditionSelectMobile" onchange="syncMobileFilters(); renderList();" class="flex-1 bg-slate-50 border-none rounded-xl py-2 px-3 focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none">
                    <option value="all">全部全新度</option>
                    <option value="0-20">0 – 20%</option>
                    <option value="21-40">21 – 40%</option>
                    <option value="41-60">41 – 60%</option>
                    <option value="61-80">61 – 80%</option>
                    <option value="81-100">81 – 100%</option>
                </select>
            </div>
        </div>

        <!-- Helper Note -->
        <div class="mb-6 flex items-center gap-2 px-4 py-3 bg-red-50/30 border border-red-100/50 rounded-2xl">
            <span class="text-red-600 font-black text-xl leading-none">！</span>
            <p class="text-slate-600 text-sm font-bold">有沒有興趣只會出現在尚未賣出的貨品</p>
        </div>

        <!-- Item Grid -->
        <div id="itemGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="package" class="w-10 h-10 text-slate-300"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800">沒有找到物件</h3>
            <p class="text-slate-500">嘗試更改篩選條件或發佈新物件</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto bg-white border-t border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-[10px] text-slate-300 font-medium">
            &copy; <span id="year"></span> 培正回收箱 · 綠色校園 資源共享
        </div>
    </footer>

    <!-- Add Item Modal -->
    <div id="addItemModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div onclick="closeModal()" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-6">發布回收物件</h2>
            <form onsubmit="handleFormSubmit(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">物件名稱</label>
                    <input type="text" id="itemContent" required placeholder="例如：二手筆記本" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">大類別</label>
                        <select id="modalMainCategory" onchange="updateModalSubCategories()" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">細類別</label>
                        <select id="modalSubCategory" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">價錢 (HKD)</label>
                    <input type="number" id="itemPrice" required placeholder="0" min="0" oninput="updatePriceConversion()" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                    <div id="priceConversion" class="mt-2 text-sm text-slate-500 font-medium hidden"></div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">全新度 (0–100)</label>
                    <input type="number" id="itemCondition" required min="0" max="100" value="100" placeholder="100" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">取消</button>
                    <button type="submit" class="flex-1 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">發佈物件</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 刪除確認 Modal -->
    <div id="confirmDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div onclick="closeConfirmDelete()" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-slate-800 mb-2">確定要刪除？</h3>
            <p id="confirmDeleteMsg" class="text-slate-600 mb-4"></p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeConfirmDelete()" class="px-4 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">取消</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors">刪除</button>
            </div>
        </div>
    </div>

    <!-- 货币选择模态框 -->
    <div id="currencyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h2 class="text-xl font-black text-slate-800 mb-6 text-center">選擇顯示貨幣</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="setCurrency('HKD')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇭🇰 HKD</button>
                <button onclick="setCurrency('USD')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇺🇸 USD</button>
                <button onclick="setCurrency('CNY')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇨🇳 CNY</button>
                <button onclick="setCurrency('EUR')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇪🇺 EUR</button>
                <button onclick="setCurrency('JPY')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇯🇵 JPY</button>
                <button onclick="setCurrency('GBP')" class="currency-option p-4 rounded-xl border-2 border-slate-200 hover:border-blue-500 transition-colors font-bold text-lg">🇬🇧 GBP</button>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAolZlRu_FkosrdUAr3q3450xey6g8tYcIrOt5dbcwbZbL-97006olyuj6qm2x3jD2Sg/exec";
        const CATEGORY_TREE = {
            "電子產品": ["電話", "平板電腦", "手提電腦", "電子配件"],
            "書籍": ["中文書籍", "英文書籍", "數學書籍", "其他書籍"],
            "衣物": ["男裝", "女裝", "童裝"],
            "家居用品": ["廚具", "家具", "裝飾品"],
            "其他": ["其他"]
        };
        const CATEGORY_ICONS = {
            "電話": "smartphone", "平板電腦": "tablet", "手提電腦": "laptop", "電子配件": "cpu",
            "中文書籍": "book-text", "英文書籍": "book-open", "數學書籍": "calculator", "其他書籍": "book",
            "男裝": "shirt", "女裝": "shirt", "童裝": "baby",
            "廚具": "utensils", "家具": "sofa", "裝飾品": "flower", "其他": "more-horizontal"
        };
        
        const CURRENCIES = {
            HKD: { rate: 1, symbol: 'HK$' },
            USD: { rate: 0.128, symbol: 'US$' },
            CNY: { rate: 1.16, symbol: '¥' },
            EUR: { rate: 0.12, symbol: '€' },
            JPY: { rate: 16.5, symbol: '¥' },
            GBP: { rate: 0.10, symbol: '£' }
        };
        const HKD_PRICE_RANGES = [
            { value: 'all', label: '全部價錢' },
            { value: '0-200', label: '0 – 200' },
            { value: '201-400', label: '201 – 400' },
            { value: '401-600', label: '401 – 600' },
            { value: '601-800', label: '601 – 800' },
            { value: '801-1000', label: '801 – 1000' },
            { value: '1001-up', label: '> 1000' }
        ];

        let currentStatusFilter = 'all';
        let currentSortBy = 'price-asc';
        let pendingDeleteId = null;
        let currentCurrency = 'HKD';

        // 全新度輔助
        function getConditionColor(c) { return c>=80 ? 'bg-green-500' : (c>=40 ? 'bg-yellow-500' : 'bg-gray-400'); }
        function getConditionLabel(c) { return c>=80 ? '接近全新' : (c>=40 ? '有使用痕跡' : '較舊'); }
        function getConditionTextColor(c) { return c>=80 ? 'text-green-700' : (c>=40 ? 'text-yellow-700' : 'text-gray-600'); }

        function normalizeRecord(record) {
            return {
                id: String(record.id || record.ID || ""),
                createdAt: record.createdAt || record.CreatedAt || "",
                content: String(record.content || record.Content || ""),
                category: String(record.category || record.Category || "其他"),
                price: Number(record.price !== undefined ? record.price : (record.Price != null ? record.Price : 0)),
                likes: Number(record.likes !== undefined ? record.likes : (record.Likes != null ? record.Likes : 0)),
                status: String(record.status || record.Status || "active"),
                condition: record.condition !== undefined ? Number(record.condition) : (record.Condition != null ? Number(record.Condition) : 100)
            };
        }

        async function fetchRecordsFromSheet() {
            if (APPS_SCRIPT_URL.includes("PASTE")) return null;
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                return Array.isArray(data.records) ? data.records.map(normalizeRecord) : null;
            } catch (e) { console.warn(e); return null; }
        }

        async function loadData() {
            const remote = await fetchRecordsFromSheet();
            if (remote) { localStorage.setItem("records", JSON.stringify(remote)); return remote; }
            const data = localStorage.getItem("records");
            return data ? JSON.parse(data) : [];
        }

        function convertToSheetFormat(record) {
            const m = { id:'ID', createdAt:'CreatedAt', content:'Content', category:'Category', price:'Price', likes:'Likes', status:'Status', condition:'Condition' };
            const r = {};
            for (let k in record) r[m[k]||k] = record[k];
            return r;
        }

        async function syncToSheet(payload) {
            if (APPS_SCRIPT_URL.includes("PASTE")) return;
            if (payload.action==="create" && payload.record) payload.record = convertToSheetFormat(payload.record);
            else if (payload.action==="update" && payload.changes) payload.changes = convertToSheetFormat(payload.changes);
            try { await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(payload) }); } catch(e) {}
        }

        async function saveData(newRecord) {
            const records = await loadData();
            records.push(newRecord);
            localStorage.setItem("records", JSON.stringify(records));
            syncToSheet({ action:"create", record: newRecord });
            showToast();
            await renderList(records);
        }

        async function updateRecord(id, updates) {
            const records = await loadData();
            const i = records.findIndex(r => r.id===id);
            if (i!==-1) { Object.assign(records[i], updates); localStorage.setItem("records", JSON.stringify(records)); syncToSheet({ action:"update", id, changes: updates }); await renderList(records); }
        }

        async function deleteRecord(id) {
            let records = await loadData();
            records = records.filter(r => r.id!==id);
            localStorage.setItem("records", JSON.stringify(records));
            syncToSheet({ action:"delete", id });
            await renderList(records);
        }

        function showToast() {
            const t = document.getElementById('successToast');
            t.classList.remove('toast-hidden');
            setTimeout(() => t.classList.add('toast-hidden'), 3000);
        }

        function confirmDelete(id, name) {
            pendingDeleteId = id;
            document.getElementById('confirmDeleteMsg').innerText = `確定要刪除「${name}」嗎？`;
            document.getElementById('confirmDeleteModal').classList.remove('hidden');
        }
        function closeConfirmDelete() { document.getElementById('confirmDeleteModal').classList.add('hidden'); pendingDeleteId = null; }
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => { if(pendingDeleteId) { await deleteRecord(pendingDeleteId); closeConfirmDelete(); } });

        // 貨幣功能
        function formatPrice(hkdPrice, currency) {
            const rate = CURRENCIES[currency]?.rate || 1;
            const symbol = CURRENCIES[currency]?.symbol || 'HK$';
            const converted = hkdPrice * rate;
            const decimals = (currency === 'JPY') ? 0 : 2;
            return symbol + ' ' + converted.toFixed(decimals);
        }

        function updatePriceRangeOptions() {
            const currency = currentCurrency;
            const rate = CURRENCIES[currency]?.rate || 1;
            const symbol = CURRENCIES[currency]?.symbol || 'HK$';
            const desktopSelect = document.getElementById('priceRangeSelect');
            const mobileSelect = document.getElementById('priceRangeSelectMobile');
            
            const optionsHtml = HKD_PRICE_RANGES.map(range => {
                if (range.value === 'all') return `<option value="all">全部價錢</option>`;
                if (range.value === '1001-up') {
                    const upVal = (1001 * rate).toFixed(0);
                    return `<option value="1001-up">> ${symbol} ${upVal}</option>`;
                }
                const [minHKD, maxHKD] = range.value.split('-').map(Number);
                const minForeign = (minHKD * rate).toFixed(0);
                const maxForeign = (maxHKD * rate).toFixed(0);
                return `<option value="${range.value}">${symbol} ${minForeign} – ${symbol} ${maxForeign}</option>`;
            }).join('');
            
            desktopSelect.innerHTML = optionsHtml;
            mobileSelect.innerHTML = optionsHtml;
        }

        // 更新模態框中的價格換算顯示
        function updatePriceConversion() {
            const priceInput = document.getElementById('itemPrice');
            const conversionDiv = document.getElementById('priceConversion');
            const hkdPrice = parseFloat(priceInput.value);
            if (isNaN(hkdPrice) || currentCurrency === 'HKD') {
                conversionDiv.classList.add('hidden');
                return;
            }
            const converted = formatPrice(hkdPrice, currentCurrency);
            conversionDiv.textContent = `≈ ${converted}`;
            conversionDiv.classList.remove('hidden');
        }

        // 當貨幣改變時，如果模態框打開，也更新換算
        function refreshPriceConversionIfOpen() {
            if (!document.getElementById('addItemModal').classList.contains('hidden')) {
                updatePriceConversion();
            }
        }

        function setCurrency(currency) {
            currentCurrency = currency;
            localStorage.setItem('currency_preference', currentCurrency);
            updatePriceRangeOptions();
            closeCurrencyModal();
            refreshPriceConversionIfOpen();
            renderList();
        }

        function openCurrencyModal() {
            document.getElementById('currencyModal').classList.remove('hidden');
        }
        function closeCurrencyModal() {
            document.getElementById('currencyModal').classList.add('hidden');
        }

        function loadCurrencyPreference() {
            const saved = localStorage.getItem('currency_preference');
            if (saved && CURRENCIES[saved]) {
                currentCurrency = saved;
            } else {
                currentCurrency = 'HKD';
            }
            updatePriceRangeOptions();
        }

        // 同步搜尋輸入
        function syncSearchInput() {
            const desktopInput = document.getElementById('searchInputDesktop');
            const mobileInput = document.getElementById('searchInputMobile');
            if (document.activeElement === desktopInput) {
                mobileInput.value = desktopInput.value;
            } else if (document.activeElement === mobileInput) {
                desktopInput.value = mobileInput.value;
            }
            renderList();
        }
        function getSearchQuery() {
            return (document.getElementById('searchInputDesktop')?.value || document.getElementById('searchInputMobile')?.value || '').toLowerCase();
        }

        // 手機版篩選器同步
        function syncMobileFilters() {
            document.getElementById('mainCategorySelect').value = document.getElementById('mainCategorySelectMobile').value;
            document.getElementById('subCategorySelect').value = document.getElementById('subCategorySelectMobile').value;
            document.getElementById('priceRangeSelect').value = document.getElementById('priceRangeSelectMobile').value;
            document.getElementById('conditionSelect').value = document.getElementById('conditionSelectMobile').value;
        }

        function toggleMoreFilters() {
            const mf = document.getElementById('mobileFilters');
            mf.classList.toggle('hidden');
        }

        function updateCategoryCounts(records) {
            const select = document.getElementById('mainCategorySelect');
            const countMap = {};
            for (let main in CATEGORY_TREE) countMap[main] = 0;
            records.forEach(item => {
                const sub = item.category;
                for (let main in CATEGORY_TREE) {
                    if (CATEGORY_TREE[main].includes(sub)) { countMap[main]++; break; }
                }
            });
            const options = select.querySelectorAll('option');
            options.forEach(opt => {
                if (opt.value !== '全部') opt.textContent = `${opt.value} (${countMap[opt.value] || 0})`;
            });
        }

        async function renderList(recordsOverride) {
            const records = recordsOverride || await loadData();
            const grid = document.getElementById('itemGrid');
            const empty = document.getElementById('emptyState');
            const search = getSearchQuery();
            const mainCat = document.getElementById('mainCategorySelect').value;
            const subCat = document.getElementById('subCategorySelect').value;
            const priceRange = document.getElementById('priceRangeSelect').value;
            const condRange = document.getElementById('conditionSelect').value;
            const currency = currentCurrency;

            const filtered = records.filter(item => {
                const c = (item.content||'').toLowerCase();
                if (search && !c.includes(search)) return false;
                if (mainCat !== '全部') {
                    const subs = CATEGORY_TREE[mainCat] || [];
                    if (subCat !== '全部') { if (item.category !== subCat) return false; }
                    else { if (!subs.includes(item.category)) return false; }
                }
                if (currentStatusFilter==='active' && item.status!=='active') return false;
                if (currentStatusFilter==='done' && item.status!=='done') return false;
                if (currentStatusFilter==='interested' && (item.likes<=0 || item.status==='done')) return false;
                if (priceRange !== 'all') {
                    const p = item.price||0;
                    if (priceRange === '1001-up') { if (p <= 1000) return false; }
                    else {
                        const [min, max] = priceRange.split('-').map(Number);
                        if (p < min || p > max) return false;
                    }
                }
                if (condRange !== 'all') {
                    const cond = item.condition!=null ? item.condition : 100;
                    const [min,max] = condRange.split('-').map(Number);
                    if (cond<min || cond>max) return false;
                }
                return true;
            });

            filtered.sort((a,b) => {
                const sa = a.status==='done'?1:0, sb = b.status==='done'?1:0;
                if (sa!==sb) return sa-sb;
                return currentSortBy==='price-asc' ? (a.price||0)-(b.price||0) : (b.price||0)-(a.price||0);
            });

            updateCategoryCounts(records);

            grid.innerHTML = '';
            if (filtered.length===0) empty.classList.remove('hidden');
            else {
                empty.classList.add('hidden');
                filtered.forEach(item => {
                    const sold = item.status==='done';
                    const liked = item.likes>0 && !sold;
                    const cond = item.condition!=null ? item.condition : 100;
                    const card = document.createElement('div');
                    card.className = `rounded-2xl p-5 border shadow-sm hover:shadow-md transition-all group ${liked?'ring-2 ring-red-500 border-red-500 bg-red-50/10': (sold?'bg-green-50/80 border-green-100 opacity-90':'bg-white border-slate-100')}`;
                    const priceDisplay = formatPrice(item.price || 0, currency);
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-slate-50 p-3 rounded-xl"><i data-lucide="${CATEGORY_ICONS[item.category]||'package'}" class="w-6 h-6 text-slate-400"></i></div>
                            <div class="flex flex-col items-end gap-2 text-right">
                                <div class="flex items-center gap-2">
                                    ${!sold?`<button onclick="handleLike('${item.id}')" class="like-btn p-1.5 rounded-full ${liked?'text-red-500 bg-red-50':'text-slate-300 hover:text-red-400'}"><i data-lucide="heart" class="w-4 h-4 ${liked?'fill-current':''}"></i></button>`:''}
                                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold">${item.category}</span>
                                </div>
                                ${sold?'<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-black">[已賣出]</span>':''}
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-1 truncate">${item.content}</h3>
                        <div class="text-2xl font-black text-blue-600 mb-1">${priceDisplay}</div>
                        <div class="mb-4">
                            <div class="flex items-center justify-between text-xs mb-1">
                                <span class="font-bold ${getConditionTextColor(cond)}">${getConditionLabel(cond)}</span>
                                <span class="text-slate-500">${cond}%</span>
                            </div>
                            <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full ${getConditionColor(cond)} rounded-full" style="width:${cond}%"></div></div>
                        </div>
                        <div class="pt-4 border-t border-slate-50 flex items-center justify-between">
                            <div class="flex items-center gap-2 text-slate-400 text-xs"><i data-lucide="tag" class="w-3 h-3"></i>${new Date(item.createdAt).toLocaleDateString()}</div>
                            <div class="flex items-center gap-2">
                                <button onclick="toggleStatus('${item.id}')" class="text-xs font-bold px-2 py-1 rounded ${sold?'bg-green-100 text-green-700':'bg-slate-100 text-slate-600'}">${sold?'恢復上架':'尚未賣出'}</button>
                                <button onclick="confirmDelete('${item.id}','${item.content.replace(/'/g,"\\'")}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        async function handleLike(id) {
            const records = await loadData();
            const i = records.findIndex(r => r.id===id);
            if (i!==-1) {
                records[i].likes = records[i].likes ? 0 : 1;
                localStorage.setItem("records", JSON.stringify(records));
                syncToSheet({ action:"update", id, changes: { likes: records[i].likes } });
                const btn = document.querySelector(`button[onclick="handleLike('${id}')"]`);
                if (btn) { btn.classList.add('heart-beat'); setTimeout(() => btn.classList.remove('heart-beat'), 400); }
                await renderList(records);
            }
        }

        async function toggleStatus(id) {
            const records = await loadData();
            const item = records.find(r => r.id===id);
            if (item) {
                const newStatus = item.status==='active'?'done':'active';
                await updateRecord(id, { status: newStatus });
            }
        }

        async function setStatusFilter(s) {
            currentStatusFilter = s;
            document.querySelectorAll('.status-btn').forEach(b => {
                b.className = `status-btn px-6 py-2 rounded-xl text-sm font-bold transition-all ${b.dataset.status===s? (s==='interested'?'bg-red-500 text-white shadow-sm':'bg-white text-blue-600 shadow-sm') : 'text-slate-500 hover:text-slate-700'}`;
            });
            await renderList();
        }

        async function toggleSort() {
            currentSortBy = currentSortBy==='price-asc'?'price-desc':'price-asc';
            const label = currentSortBy==='price-asc'?'由低至高':'由高至低';
            document.getElementById('sortLabelDesktop').innerText = '價格：'+label;
            document.getElementById('sortLabelMobile').innerText = label;
            document.getElementById('sortIconDesktop').style.transform = currentSortBy==='price-desc'?'rotate(180deg)':'';
            document.getElementById('sortIconMobile').style.transform = currentSortBy==='price-desc'?'rotate(180deg)':'';
            await renderList();
        }

        function initCategorySelects() {
            const main = document.getElementById('mainCategorySelect');
            const mainMobile = document.getElementById('mainCategorySelectMobile');
            main.innerHTML = '<option value="全部">所有大類別</option>';
            mainMobile.innerHTML = '<option value="全部">所有大類別</option>';
            const modal = document.getElementById('modalMainCategory');
            modal.innerHTML = '';
            Object.keys(CATEGORY_TREE).forEach(cat => {
                main.add(new Option(cat, cat));
                mainMobile.add(new Option(cat, cat));
                modal.add(new Option(cat, cat));
            });
            updateModalSubCategories();
        }

        function updateSubCategories() {
            const main = document.getElementById('mainCategorySelect').value;
            const sub = document.getElementById('subCategorySelect');
            const subMobile = document.getElementById('subCategorySelectMobile');
            sub.innerHTML = '<option value="全部">所有細類別</option>';
            subMobile.innerHTML = '<option value="全部">所有細類別</option>';
            if (main!=='全部') {
                sub.disabled = false;
                subMobile.disabled = false;
                CATEGORY_TREE[main].forEach(s => { sub.add(new Option(s,s)); subMobile.add(new Option(s,s)); });
            } else {
                sub.disabled = true;
                subMobile.disabled = true;
            }
        }

        function updateModalSubCategories() {
            const main = document.getElementById('modalMainCategory').value;
            const sub = document.getElementById('modalSubCategory');
            sub.innerHTML = '';
            CATEGORY_TREE[main].forEach(s => sub.add(new Option(s, s)));
        }

        function openModal() {
            document.getElementById('addItemModal').classList.remove('hidden');
            updatePriceConversion(); // 打開時立即更新換算
        }
        function closeModal() {
            document.getElementById('addItemModal').classList.add('hidden');
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now()+"_"+Math.random().toString(36).slice(2,6),
                createdAt: new Date().toISOString(),
                content: document.getElementById('itemContent').value,
                category: document.getElementById('modalSubCategory').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                status: "active",
                likes: 0,
                condition: parseInt(document.getElementById('itemCondition').value)||100
            };
            await saveData(newRecord);
            closeModal();
            e.target.reset();
            document.getElementById('itemCondition').value = 100;
            // 隱藏換算提示
            document.getElementById('priceConversion').classList.add('hidden');
        }

        async function handleAISummary() {
            const btn = document.getElementById('aiBtn'), txt = document.getElementById('aiBtnText');
            btn.disabled = true; txt.textContent = '思考中...';
            try {
                const records = await loadData();
                if (!records.length) { alert('未有轉賣資料'); return; }
                const input = records.slice(0,30).map(r => `[${r.category}] ${r.content} (全新度 ${r.condition!=null?r.condition:100}%)`).join('\n');
                const prompt = '以下是班級轉賣牆嘅留言。請用繁體中文，用 3-5 句概括同學最關心嘅問題、情緒同有冇明顯 patterns:\n\n'+input;
                const res = await fetch(APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body: JSON.stringify({ action:"askAI", prompt }) });
                const data = await res.json();
                alert(data.result || data.error || "AI 冇回應");
            } catch(e) { alert('AI 出錯：'+e.message); }
            finally { btn.disabled = false; txt.textContent = 'AI 摘要'; }
        }

        // 初始化：检查货币偏好，若无则弹窗
        async function initializeApp() {
            document.getElementById('year').innerText = new Date().getFullYear();
            initCategorySelects();
            loadCurrencyPreference();
            if (!localStorage.getItem('currency_preference')) {
                openCurrencyModal();
            } else {
                await renderList();
            }
            lucide.createIcons();
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
